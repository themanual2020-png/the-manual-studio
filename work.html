<script>
  let allProjects = [];
  let currentFilter = 'all';

  function proxyImg(url) {
    if (!url) return url;
    if (url.includes('pzrjboiioplhijzyfdmf.supabase.co/storage/')) {
      return `/api/img?src=${encodeURIComponent(url)}`;
    }
    return url;
  }

  async function loadProjects() {
    if (!supabase) {
      console.error('Supabase not initialized');
      return;
    }
    try {
      const data = await supabase.getPublishedProjects('project_id,title,subtitle,type_label,cat_label,hero_placeholder');
      allProjects = data && data.length ? data : [];
    } catch (error) {
      console.error('❌ Failed to load projects:', error.message);
      allProjects = [];
    }
    renderProjects();
  }

  function renderProjects() {
    const grid = document.getElementById('tms-grid');
    if (!allProjects.length) {
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#9a958a;padding:60px 0;">ยังไม่มีผลงาน</p>';
      return;
    }
    const cards = allProjects.map(p => {
      const catLabel = p.cat_label || 'OTHER';
      const catValue = catLabel.includes('INTERIOR') ? 'interior' :
                       catLabel.includes('EVENT') ? 'event' :
                       catLabel.includes('DOCUMENTARY') ? 'doc' :
                       catLabel.includes('PRESENTATION') ? 'presentation' : 'all';
      return `
        <article data-card data-cat="${catValue}" data-reveal class="tms-card" style="cursor: pointer;" data-project-id="${p.project_id}">
          <div style="position: relative; overflow: hidden; aspect-ratio: 4/3;">
            ${p.hero_placeholder ? `<img src="${proxyImg(p.hero_placeholder)}" alt="${p.title}" loading="lazy" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center;">` : '<div style="position: absolute; inset: 0; background: #e5e4e1;"></div>'}
            <span style="position: absolute; top: 14px; left: 14px; font-family: 'Archivo', sans-serif; font-size: 10.5px; font-weight: 700; letter-spacing: .14em; background: rgba(245,244,241,.92); color: #15140f; padding: 5px 10px; border-radius: 999px;">${p.type_label || 'MEDIA'}</span>
          </div>
          <div style="margin-top: 16px;">
            <div style="font-size: 19px; font-weight: 600;">${p.title}</div>
            <div style="color: #9a958a; font-size: 14px; font-weight: 300;">${p.subtitle || ''}</div>
          </div>
        </article>
      `;
    }).join('');
    grid.innerHTML = cards;
    applyFilter(currentFilter);
  }

  function applyFilter(f) {
    currentFilter = f;
    let shown = 0;
    document.querySelectorAll('[data-card]').forEach(card => {
      const match = f === 'all' || card.getAttribute('data-cat') === f;
      card.style.display = match ? '' : 'none';
      if (match) shown++;
    });
    document.getElementById('tms-empty').style.display = shown === 0 ? 'block' : 'none';
    document.querySelectorAll('#tms-filters button').forEach(b => {
      const active = b.getAttribute('data-filter') === f;
      b.style.background = active ? '#15140f' : 'transparent';
      b.style.color = active ? '#f5f4f1' : '#15140f';
      b.style.borderColor = active ? '#15140f' : '#d2cec5';
    });
  }

  document.getElementById('tms-filters').addEventListener('click', e => {
    const btn = e.target.closest('button[data-filter]');
    if (btn) applyFilter(btn.getAttribute('data-filter'));
  });

  document.getElementById('tms-grid').addEventListener('click', e => {
    const card = e.target.closest('[data-project-id]');
    if (card) window.location.href = `project.html?id=${encodeURIComponent(card.getAttribute('data-project-id'))}`;
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(loadProjects, 100));
  } else {
    setTimeout(loadProjects, 100);
  }
</script>

<!-- Vercel Analytics -->
<script defer src="/_vercel/insights/script.js"></script>
<!-- Own Analytics (Supabase) -->
<script>
(function () {
  function getVisitorId() {
    let id = localStorage.getItem('tms_vid');
    if (!id) { id = crypto.randomUUID(); localStorage.setItem('tms_vid', id); }
    return id;
  }
  function getTrafficSource() {
    const params = new URLSearchParams(window.location.search);
    const utm = params.get('utm_source');
    if (utm) return utm.charAt(0).toUpperCase() + utm.slice(1);
    const ref = document.referrer;
    if (!ref) return 'Direct';
    try {
      const host = new URL(ref).hostname.replace('www.', '');
      if (host === window.location.hostname) return 'Direct';
      if (host.includes('facebook.com') || host.includes('fb.com')) return 'Facebook';
      if (host.includes('instagram.com')) return 'Instagram';
      if (host.includes('google.')) return 'Google (SEO)';
      if (host.includes('line.me') || host.includes('lin.ee')) return 'Line';
      return host;
    } catch (e) { return 'Other'; }
  }
  function getDeviceType() {
    return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop';
  }
  const trafficSource = getTrafficSource();
  const deviceType = getDeviceType();
  window.tmsTrack = function (eventType, projectId) {
    fetch('/api/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        event_type: eventType,
        page: 'work.html',
        project_id: projectId || null,
        visitor_id: getVisitorId(),
        source: trafficSource,
        device_type: deviceType,
      }),
    }).catch(function () {});
  };
  window.tmsTrack('page_view');
})();

document.addEventListener('DOMContentLoaded', function () {
  document.addEventListener('click', function (e) {
    const card = e.target.closest('[data-project-id]');
    if (card) {
      window.va && window.va('track', 'Click Project', { project: card.dataset.projectId });
      window.tmsTrack('click_project', card.dataset.projectId);
    }
  });
});
</script>

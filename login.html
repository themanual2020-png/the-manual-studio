<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — The Manual Studio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #f5f4f1;
      font-family: 'Anuphan', system-ui, sans-serif;
      color: #15140f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-container {
      background: white;
      border-radius: 8px;
      padding: 60px 40px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      margin: 0 0 24px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #9a958a;
      text-align: center;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .08em;
      color: #15140f;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid #d2cec5;
      border-radius: 4px;
      font-family: inherit;
      transition: all .2s ease;
    }

    input:focus {
      outline: none;
      border-color: #15140f;
      box-shadow: 0 0 0 2px rgba(21,20,15,0.1);
    }

    button {
      width: 100%;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .08em;
      background: #15140f;
      color: #f5f4f1;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all .2s ease;
      font-family: inherit;
    }

    button:hover {
      background: #2a2820;
    }

    button:active {
      transform: scale(0.98);
    }

    .error {
      color: #c1533a;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    .error.show {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      font-size: 13px;
      color: #9a958a;
      text-decoration: none;
      transition: color .2s ease;
    }

    .back-link a:hover {
      color: #15140f;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>📋 Admin Panel</h1>
    <p class="subtitle">The Manual Studio</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit">Sign In</button>

      <div class="error" id="error"></div>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to Website</a>
    </div>
  </div>

  <script src="./auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');

      if (login(username, password)) {
        window.location.href = 'admin.html';
      } else {
        errorEl.textContent = 'Username หรือ Password ผิด';
        errorEl.classList.add('show');
        document.getElementById('password').value = '';
      }
    });

    // If already logged in, redirect to admin
    if (isLoggedIn()) {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>

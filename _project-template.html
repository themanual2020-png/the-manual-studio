<script>
  function convertGDriveLink(url) {
    if (!url) return url;
    if (url.includes('drive.google.com')) {
      const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
      if (match && match[1]) {
        return `https://drive.google.com/uc?export=view&id=${match[1]}`;
      }
    }
    if (url.includes('pzrjboiioplhijzyfdmf.supabase.co/storage/')) {
      return `/api/img?src=${encodeURIComponent(url)}`;
    }
    return url;
  }

  let currentProjectTitle = '';

  async function loadProjectDetail() {
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');

    if (!projectId) {
      document.body.textContent = 'Project not found';
      return;
    }

    setTimeout(async () => {
      if (!supabase) {
        console.error('Supabase not initialized');
        return;
      }

      try {
        const project = await supabase.getProject(projectId);

        if (!project) {
          document.body.textContent = 'Project not found';
          return;
        }

        currentProjectTitle = project.title || '';

        document.getElementById('project-title').textContent = project.title || '—';
        document.getElementById('project-subtitle').textContent = project.subtitle || '—';
        document.getElementById('project-year').textContent = project.year || '—';
        document.getElementById('project-location').textContent = project.location || '—';
        document.getElementById('project-type').textContent = project.type_label || '—';
        document.getElementById('project-category').textContent = project.cat_label || '—';
        document.getElementById('project-body').innerHTML = project.body ? formatBodyText(project.body) : '—';
        if (project.client) {
          document.getElementById('project-client').textContent = project.client;
          document.getElementById('client-section').style.display = '';
        }

        if (project.hero_placeholder) {
          const heroImg = document.getElementById('hero-image');
          heroImg.src = convertGDriveLink(project.hero_placeholder);
          heroImg.alt = project.title || 'Project Hero';
          heroImg.style.display = 'block';
          document.getElementById('hero-placeholder').style.display = 'none';
        }

        if (project.youtube_url) {
          const ytMatch = project.youtube_url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
          if (ytMatch) {
            document.getElementById('youtube-embed').innerHTML =
              `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:8px;" allowfullscreen></iframe>`;
            document.getElementById('video-section').style.display = '';
          }
        }

        const gallery = Array.isArray(project.gallery_images) ? project.gallery_images : [];
        if (gallery.length > 0) {
          const galleryGrid = document.getElementById('gallery-grid');
          galleryGrid.innerHTML = gallery.map((img, i) => `
            <div class="gallery-item">
              <img src="${escapeHtml(convertGDriveLink(convertGDriveLink(img.url || img)))}" alt="${escapeHtml(img.caption || `${project.title} — ภาพที่ ${i + 1}`)}">
            </div>
          `).join('');
          document.getElementById('gallery-section').style.display = 'block';
        }

        const sections = Array.isArray(project.project_sections) ? project.project_sections : [];
        if (sections.length > 0) {
          const container = document.getElementById('sections-container');
          container.innerHTML = sections.map((s, idx) => renderBlock(s, idx)).join('');
          initSliders();
        }

        // More Projects
        loadMoreProjects(projectId);

        document.title = `${project.title} — The Manual Studio`;
        // Update meta tags dynamically
        const desc = project.body ? stripMarkdown(project.body).slice(0, 160) : `${project.title} — ผลงานโดย The Manual Studio`;
        document.querySelector('meta[name="description"]').setAttribute('content', desc);
        document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${project.title} — The Manual Studio`);
        document.querySelector('meta[property="og:description"]')?.setAttribute('content', desc);
        if (project.hero_placeholder) {
          document.querySelector('meta[property="og:image"]')?.setAttribute('content', project.hero_placeholder);
          document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', project.hero_placeholder);
        }
        const pageUrl = `https://themanualstudio.vercel.app/project.html?id=${encodeURIComponent(project.project_id)}`;
        document.querySelector('link[rel="canonical"]')?.setAttribute('href', pageUrl);
        document.querySelector('meta[property="og:url"]')?.setAttribute('content', pageUrl);

      } catch (error) {
        console.error('Failed to load project:', error);
        document.body.textContent = 'Error loading project';
      }
    }, 100);
  }

  async function loadMoreProjects(currentId) {
    try {
      const all = await supabase.getPublishedProjects();
      const others = all.filter(p => p.project_id !== currentId);
      if (!others.length) return;

      // shuffle and pick up to 4
      const picks = others.sort(() => Math.random() - 0.5).slice(0, 4);
      const grid = document.getElementById('more-projects-grid');
      grid.innerHTML = picks.map(p => {
        const img = convertGDriveLink(p.hero_placeholder || '');
        const url = `project.html?id=${encodeURIComponent(p.project_id)}`;
        return `<a href="${url}" style="text-decoration:none;color:inherit;display:block;">
          <div style="aspect-ratio:4/3;overflow:hidden;border-radius:8px;background:#e2dfd8;margin-bottom:14px;">
            ${img ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(p.title || '')}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;">` : ''}
          </div>
          <div style="font-size:15px;font-weight:400;line-height:1.3;margin-bottom:4px;">${escapeHtml(p.title || '')}</div>
          ${p.cat_label ? `<div style="font-family:'Archivo',sans-serif;font-size:11px;font-weight:700;letter-spacing:.16em;color:#9a958a;">${escapeHtml(p.cat_label)}</div>` : ''}
        </a>`;
      }).join('');

      // hover zoom on images
      grid.querySelectorAll('a').forEach(card => {
        const img = card.querySelector('img');
        if (!img) return;
        card.addEventListener('mouseenter', () => img.style.transform = 'scale(1.05)');
        card.addEventListener('mouseleave', () => img.style.transform = '');
      });

      document.getElementById('more-projects-section').style.display = '';
    } catch (e) {
      console.warn('loadMoreProjects error:', e);
    }
  }

  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return String(text).replace(/[&<>"']/g, m => map[m]);
  }

  function wrapThai(text) {
    return escapeHtml(text).replace(/([\u0E00-\u0E7F]+)/g, '<span style="font-family:\'Prompt\',sans-serif">$1</span>');
  }

  function stripMarkdown(s) {
    return String(s)
      .replace(/^##\s+/gm, '')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/\n+/g, ' ')
      .trim();
  }

  function formatBodyText(body) {
    const escaped = escapeHtml(body).replace(/\r\n/g, '\n');
    return escaped
      .split(/\n{2,}/)
      .map(para => para.trim())
      .filter(para => para)
      .map(para => {
        const heading = para.match(/^##\s+([\s\S]+)$/);
        const inline = s => s
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>');
        if (heading) {
          return `<h2 class="block-subhead">${inline(heading[1])}</h2>`;
        }
        return `<p>${inline(para).replace(/\n/g, '<br>')}</p>`;
      })
      .join('');
  }

  function renderBlock(b, idx) {
    const type = b.type || 'text';

    if (type === 'text') {
      return `<div class="block-wrap">
        <div class="block-inner narrow block-text" data-reveal>
          ${b.title ? `<h3>${wrapThai(b.title)}</h3>` : ''}
          ${b.body ? formatBodyText(b.body) : ''}
        </div>
      </div>`;

    if (type === 'image') {
      const url = convertGDriveLink(b.image_url || '');

    if (type === 'slider') {

    }

    if (type === 'youtube') {
      const url = b.url || '';

          </div>

    }

    if (type === 'gallery') {
      const imgs = Array.isArray(b.images) ? b.images.filter(u => u) : [];

        phone:     `<span class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#6b6660" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .99h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></span>`,
        facebook:  `<span class="info-icon fb"><svg viewBox="0 0 24 24" fill="#fff"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></span>`,
        instagram: `<span class="info-icon ig"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="#fff" stroke="none"/></svg></span>`,
        line:      `<span class="info-icon line-ic"><svg viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg></span>`,
        youtube:   `<span class="info-icon yt-ic"><svg viewBox="0 0 24 24" fill="#fff"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></span>`,

        b.facebook  ? (()=>{ const raw = b.facebook.replace(/^https?:\/\/(www\.)?facebook\.com\//,'').replace(/\/$/,''); const label = (raw.startsWith('profile.php') || raw === '') ? 'Facebook' : raw; return `<div class="info-row">${ICON_MAP.facebook}<a href="${escapeHtml(b.facebook)}" target="_blank" rel="noopener" class="info-link">${escapeHtml(label)}</a></div>`; })() : '',

  let _lbImgs = [], _lbIdx = 0;
  function lbOpenAttr(el) {
    const imgs = JSON.parse(el.dataset.imgs);
    lbOpen(imgs, parseInt(el.dataset.idx));
  }
  function lbOpen(imgs, idx) {
    _lbImgs = imgs; _lbIdx = idx;
    const img = document.getElementById('lb-img');
    img.src = convertGDriveLink(imgs[idx]);
    img.alt = `${currentProjectTitle} — รูปที่ ${idx + 1}`;
    document.getElementById('lb-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    const hasMult = imgs.length > 1;
    document.getElementById('lb-prev').style.display = hasMult ? '' : 'none';
    document.getElementById('lb-next').style.display = hasMult ? '' : 'none';
  }
  function lbClose() {
    document.getElementById('lb-overlay').classList.remove('active');
    document.body.style.overflow = '';
  }
  function lbStep(dir) {
    _lbIdx = (_lbIdx + dir + _lbImgs.length) % _lbImgs.length;
    const img = document.getElementById('lb-img');
    img.src = convertGDriveLink(_lbImgs[_lbIdx]);
    img.alt = `${currentProjectTitle} — รูปที่ ${_lbIdx + 1}`;
  }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb-overlay').classList.contains('active')) return;
    if (e.key === 'Escape') lbClose();
    if (e.key === 'ArrowLeft') lbStep(-1);
    if (e.key === 'ArrowRight') lbStep(1);
  });
  document.getElementById('lb-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('lb-overlay')) lbClose();
  });

  function initSliders() {
    document.querySelectorAll('[data-slider]').forEach(slider => {
      const track = slider.querySelector('.slider-track');
      const dotsWrap = slider.parentElement.querySelector('.slider-dots');
      const total = slider.querySelectorAll('.slider-slide').length;
      let cur = 0;
      let timer = null;

      function go(n) {
        cur = (n + total) % total;
        track.style.transform = `translateX(-${cur * 100}%)`;
        if (dotsWrap) dotsWrap.querySelectorAll('.slider-dot').forEach((d,i) => d.classList.toggle('active', i===cur));
      }

      function startAuto() {
        stopAuto();
        timer = setInterval(() => go(cur + 1), 3000);
      }
      function stopAuto() {
        if (timer) { clearInterval(timer); timer = null; }
      }

      slider.querySelector('.slider-prev')?.addEventListener('click', () => { go(cur - 1); startAuto(); });
      slider.querySelector('.slider-next')?.addEventListener('click', () => { go(cur + 1); startAuto(); });
      dotsWrap?.querySelectorAll('.slider-dot').forEach((d, i) => d.addEventListener('click', () => { go(i); startAuto(); }));

      // Pause on hover (desktop)
      slider.addEventListener('mouseenter', stopAuto);
      slider.addEventListener('mouseleave', startAuto);

      // Swipe support (mobile)
      let touchX = 0;
      slider.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; stopAuto(); }, { passive: true });
      slider.addEventListener('touchend', e => {
        const diff = touchX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) go(cur + (diff > 0 ? 1 : -1));
        setTimeout(startAuto, 3000);
      }, { passive: true });

      startAuto();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadProjectDetail);
  } else {
    loadProjectDetail();
  }
</script>

  function getTrafficSource() {
    const params = new URLSearchParams(window.location.search);
    const utm = params.get('utm_source');
    if (utm) return utm.charAt(0).toUpperCase() + utm.slice(1);
    const ref = document.referrer;
    if (!ref) return 'Direct';
    try {
      const host = new URL(ref).hostname.replace('www.', '');
      if (host === window.location.hostname) return 'Direct';
      if (host.includes('facebook.com') || host.includes('fb.com')) return 'Facebook';
      if (host.includes('instagram.com')) return 'Instagram';
      if (host.includes('google.')) return 'Google (SEO)';

      return host;

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inbox — The Manual Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Prompt:wght@400;500&display=swap" rel="stylesheet">
<script src="./auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #f5f4f1; font-family: 'Prompt', system-ui, sans-serif; color: #15140f; }

  .inbox-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

  .inbox-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    border-bottom: 2px solid #e2dfd8;
    padding-bottom: 20px;
  }
  .inbox-header h1 { margin: 0; font-family: 'Archivo', sans-serif; font-size: 32px; }
  .inbox-actions { display: flex; gap: 12px; }

  button {
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .08em;
    padding: 12px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary { background: #15140f; color: #f5f4f1; }
  .btn-primary:hover { opacity: .8; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: #15140f; border: 1px solid #d2cec5; }
  .btn-secondary:hover { border-color: #15140f; }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .platform-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .platform-tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #d2cec5;
    background: transparent;
    color: #15140f;
    font-size: 12px;
  }
  .platform-tab.active { background: #15140f; color: #f5f4f1; border-color: #15140f; }

  .inbox-layout { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }

  .thread-list {
    background: #fff;
    border: 1px solid #e2dfd8;
    border-radius: 8px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .thread-item {
    padding: 14px 16px;
    border-bottom: 1px solid #f0eee9;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .thread-item:hover { background: #f9f8f5; }
  .thread-item.active { background: #f0eee9; }
  .thread-top { display: flex; justify-content: space-between; align-items: center; }
  .thread-name { font-weight: 600; font-size: 14px; }
  .thread-time { font-size: 11px; color: #9a958a; }
  .thread-preview { font-size: 12px; color: #6b6759; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread-meta { display: flex; gap: 6px; align-items: center; }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .05em;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
  }
  .badge-facebook { background: #e7f0ff; color: #1877f2; }
  .badge-instagram { background: #fde8f4; color: #c13584; }
  .badge-line { background: #e3f9ec; color: #06c755; }
  .badge-pending_review { background: #fde8e8; color: #c1533a; }
  .badge-unread { background: #15140f; color: #f5f4f1; border-radius: 10px; padding: 1px 7px; font-size: 10px; }

  .empty-state { padding: 40px 20px; text-align: center; color: #9a958a; font-size: 13px; }

  .thread-detail {
    background: #fff;
    border: 1px solid #e2dfd8;
    border-radius: 8px;
    min-height: 70vh;
    display: flex;
    flex-direction: column;
  }
  .thread-detail-header {
    padding: 16px 20px;
    border-bottom: 1px solid #e2dfd8;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .thread-detail-header h2 { margin: 0; font-family: 'Archivo', sans-serif; font-size: 18px; }

  .messages-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; max-height: 50vh; }

  .msg { max-width: 70%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
  .msg-inbound { background: #f0eee9; align-self: flex-start; }
  .msg-outbound { background: #15140f; color: #f5f4f1; align-self: flex-end; }
  .msg-outbound.ai-auto { background: #2c6b4f; }
  .msg-sender { font-size: 10px; opacity: .7; margin-bottom: 4px; letter-spacing: .05em; text-transform: uppercase; }

  .composer { border-top: 1px solid #e2dfd8; padding: 16px 20px; }
  .composer textarea {
    width: 100%;
    min-height: 70px;
    padding: 10px 12px;
    border: 1px solid #d2cec5;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
  }
  .composer-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

  .no-selection { display: flex; align-items: center; justify-content: center; flex: 1; color: #9a958a; font-size: 14px; }

  @media (max-width: 800px) {
    .inbox-layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="inbox-container">
  <div class="inbox-header">
    <h1>💬 Inbox</h1>
    <div class="inbox-actions">
      <button class="btn-secondary" id="btn-add-page">+ เพจ FB/IG</button>
      <a class="btn-secondary" href="admin.html" style="text-decoration:none;display:inline-flex;align-items:center;">📋 Admin</a>
      <button class="btn-secondary" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="platform-tabs" id="platform-tabs">
    <button class="platform-tab active" data-platform="">ทั้งหมด</button>
    <button class="platform-tab" data-platform="facebook">Facebook</button>
    <button class="platform-tab" data-platform="instagram">Instagram</button>
    <button class="platform-tab" data-platform="line">LINE OA</button>
  </div>

  <div class="inbox-layout">
    <div class="thread-list" id="thread-list">
      <p class="empty-state">Loading conversations...</p>
    </div>

    <div class="thread-detail" id="thread-detail">
      <div class="no-selection">เลือกแชทจากรายการด้านซ้าย</div>
    </div>
  </div>
</div>

<script>
  const PLATFORM_LABELS = { facebook: 'Facebook', instagram: 'Instagram', line: 'LINE OA' };
  const POLL_MS = 18000;

  let state = {
    platformFilter: '',
    conversations: [],
    selectedId: null,
    messages: [],
  };

  async function apiGet(url) {
    const res = await fetch(url);
    if (res.status === 401) {
      window.location.href = 'login.html';
      throw new Error('unauthorized');
    }
    if (!res.ok) throw new Error(`request failed: ${res.status}`);
    return res.json();
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const diffMs = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'now';
    if (mins < 60) return `${mins}m`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h`;
    return `${Math.floor(hours / 24)}d`;
  }

  function renderThreadList() {
    const el = document.getElementById('thread-list');
    const items = state.conversations;
    if (!items.length) {
      el.innerHTML = '<p class="empty-state">ยังไม่มีแชทในหมวดนี้</p>';
      return;
    }
    el.innerHTML = items.map((c) => `
      <div class="thread-item ${c.id === state.selectedId ? 'active' : ''}" data-id="${c.id}">
        <div class="thread-top">
          <span class="thread-name">${escapeHtml(c.customer_name || 'Unknown')}</span>
          <span class="thread-time">${timeAgo(c.last_message_at)}</span>
        </div>
        <div class="thread-meta">
          <span class="badge badge-${c.platform}">${PLATFORM_LABELS[c.platform] || c.platform}</span>
          ${c.status === 'pending_review' ? '<span class="badge badge-pending_review">Needs approval</span>' : ''}
          ${c.unread_count ? `<span class="badge-unread">${c.unread_count}</span>` : ''}
        </div>
        <div class="thread-preview">${escapeHtml(c.last_message_preview || '')}</div>
      </div>
    `).join('');

    el.querySelectorAll('.thread-item').forEach((node) => {
      node.addEventListener('click', () => selectConversation(node.dataset.id));
    });
  }

  function escapeHtml(str) {
    return String(str || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  async function loadConversations() {
    const qs = state.platformFilter ? `?platform=${encodeURIComponent(state.platformFilter)}` : '';
    const data = await apiGet(`/api/inbox-list${qs}`);
    state.conversations = data.conversations || [];
    renderThreadList();
  }

  async function selectConversation(id) {
    state.selectedId = id;
    renderThreadList();
    await loadThread();
  }

  async function loadThread(fullRender = true) {
    if (!state.selectedId) return;
    const data = await apiGet(`/api/inbox-thread?conversation_id=${encodeURIComponent(state.selectedId)}`);
    state.messages = data.messages || [];
    if (fullRender) {
      renderThreadDetail();
    } else {
      updateMessagesOnly();
    }
  }

  function messageHtml(m) {
    return `
      <div class="msg ${m.direction === 'inbound' ? 'msg-inbound' : 'msg-outbound'} ${m.sender_type === 'ai_auto' ? 'ai-auto' : ''}">
        <div class="msg-sender">${senderLabel(m)}</div>
        <div>${escapeHtml(m.content)}</div>
      </div>
    `;
  }

  // Only refreshes the message list, leaving the composer (and whatever the
  // admin is mid-typing) untouched — used by the background poll.
  function updateMessagesOnly() {
    const scrollEl = document.getElementById('messages-scroll');
    if (!scrollEl) return;
    scrollEl.innerHTML = state.messages.map(messageHtml).join('') || '<p class="empty-state">ยังไม่มีข้อความ</p>';
    scrollEl.scrollTop = scrollEl.scrollHeight;
  }

  function renderThreadDetail() {
    const el = document.getElementById('thread-detail');
    const conversation = state.conversations.find((c) => c.id === state.selectedId);

    if (!conversation) {
      el.innerHTML = '<div class="no-selection">เลือกแชทจากรายการด้านซ้าย</div>';
      return;
    }

    const messagesHtml = state.messages.map(messageHtml).join('');

    const canSend = ['line', 'facebook', 'instagram'].includes(conversation.platform);
    el.innerHTML = `
      <div class="thread-detail-header">
        <h2>${escapeHtml(conversation.customer_name || 'Unknown')}</h2>
        <span class="badge badge-${conversation.platform}">${PLATFORM_LABELS[conversation.platform] || conversation.platform}</span>
      </div>
      <div class="messages-scroll" id="messages-scroll">${messagesHtml || '<p class="empty-state">ยังไม่มีข้อความ</p>'}</div>
      ${canSend ? `
        <div class="composer">
          <textarea id="reply-text" placeholder="พิมพ์ข้อความตอบลูกค้า... (Enter = ส่ง, Shift+Enter = ขึ้นบรรทัดใหม่)"></textarea>
          <div class="composer-actions">
            <button class="btn-primary btn-sm" id="btn-send-reply">ส่งข้อความ</button>
          </div>
        </div>
      ` : `
        <div class="composer">
          <p class="empty-state" style="padding:0;">การส่งข้อความจริงสำหรับ ${PLATFORM_LABELS[conversation.platform]} จะเปิดใช้งานใน Phase ถัดไป</p>
        </div>
      `}
    `;

    const scrollEl = document.getElementById('messages-scroll');
    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;

    if (canSend) {
      document.getElementById('btn-send-reply').addEventListener('click', () => sendReply(conversation.id));
      document.getElementById('reply-text').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendReply(conversation.id);
        }
      });
    }
  }

  async function sendReply(conversationId) {
    const textarea = document.getElementById('reply-text');
    const content = textarea.value.trim();
    if (!content) return;
    const btn = document.getElementById('btn-send-reply');
    btn.disabled = true;
    try {
      const res = await fetch('/api/send-message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversationId, content }),
      });
      if (res.status === 401) {
        window.location.href = 'login.html';
        return;
      }
      if (!res.ok) throw new Error(`request failed: ${res.status}`);
      await loadConversations();
      await loadThread();
    } catch (err) {
      console.error(err);
      alert('ส่งข้อความไม่สำเร็จ ลองใหม่อีกครั้ง');
    } finally {
      btn.disabled = false;
    }
  }

  function senderLabel(m) {
    if (m.sender_type === 'ai_auto') return 'AI (auto)';
    if (m.sender_type === 'ai_draft') return 'AI draft';
    if (m.sender_type === 'admin') return 'You';
    return 'Customer';
  }

  document.getElementById('btn-add-page').addEventListener('click', async () => {
    const pageId = prompt('วาง Page ID (ตัวเลขที่โชว์ใต้ชื่อเพจในหน้า Meta Developer Console):');
    if (!pageId) return;
    const token = prompt('วาง Page Access Token ของเพจนี้:');
    if (!token) return;
    try {
      const res = await fetch('/api/meta-register-page', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page_id: pageId.trim(), access_token: token.trim() }),
      });
      const result = await res.json();
      if (res.ok && result.ok) {
        const name = result.page.page_name || result.page.page_id;
        alert(`เพิ่มเพจสำเร็จ: ${name}${result.page.ig_account_id ? ' (เชื่อม Instagram แล้ว)' : ' (ยังไม่เชื่อม Instagram)'}`);
      } else {
        alert(`เพิ่มเพจไม่สำเร็จ: ${result.error || 'unknown error'}`);
      }
    } catch (err) {
      console.error(err);
      alert('เพิ่มเพจไม่สำเร็จ ลองใหม่อีกครั้ง');
    }
  });

  document.getElementById('platform-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.platform-tab');
    if (!btn) return;
    document.querySelectorAll('.platform-tab').forEach((t) => t.classList.remove('active'));
    btn.classList.add('active');
    state.platformFilter = btn.dataset.platform;
    loadConversations();
  });

  async function init() {
    await loadConversations();
    setInterval(async () => {
      await loadConversations();
      if (state.selectedId) await loadThread(false);
    }, POLL_MS);
  }

  init();
</script>
</body>
</html>

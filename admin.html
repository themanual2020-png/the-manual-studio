<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — The Manual Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="./auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #f5f4f1; font-family: 'Anuphan', system-ui, sans-serif; color: #15140f; }

  .admin-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    border-bottom: 2px solid #e2dfd8;
    padding-bottom: 20px;
  }

  .admin-header h1 { margin: 0; font-family: 'Archivo', sans-serif; font-size: 32px; }
  .admin-actions { display: flex; gap: 12px; }

  button {
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .08em;
    padding: 12px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-primary { background: #15140f; color: #f5f4f1; }
  .btn-primary:hover { opacity: .8; }
  .btn-secondary { background: transparent; color: #15140f; border: 1px solid #d2cec5; }
  .btn-secondary:hover { border-color: #15140f; }
  .btn-danger { background: #b3261e; color: #f5f4f1; }
  .btn-danger:hover { opacity: .8; }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 24px;
    margin-bottom: 40px;
  }

  .project-card {
    border: 1px solid #e2dfd8;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    transition: all .2s;
  }

  .project-card:hover { box-shadow: 0 4px 12px rgba(21,20,15,.1); transform: translateY(-2px); }

  .project-card-thumb {
    width: 100%;
    height: 180px;
    background: #e2dfd8;
    object-fit: cover;
    display: block;
  }

  .project-card-thumb-placeholder {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, #e2dfd8 0%, #ccc9c0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9a958a;
    font-size: 32px;
  }

  .project-card-body { padding: 20px; }
  .project-card-body h3 { margin: 0 0 6px; font-size: 17px; font-family: 'Archivo', sans-serif; }
  .project-card-body p { margin: 4px 0; font-size: 12px; color: #9a958a; }

  .project-meta-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
  .meta-tag {
    background: #f5f4f1;
    border: 1px solid #e2dfd8;
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    color: #9a958a;
  }

  .project-actions { display: flex; gap: 8px; margin-top: 14px; }
  .project-actions button { flex: 1; padding: 8px 12px; font-size: 12px; }

  /* ====== MODAL ====== */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(21,20,15,.5);
    z-index: 1000;
    overflow-y: auto;
  }
  .modal.active { display: flex; align-items: flex-start; justify-content: center; padding: 20px; }

  .modal-content {
    background: #fff;
    border-radius: 12px;
    max-width: 760px;
    width: 100%;
    margin-top: 40px;
    margin-bottom: 40px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 32px 0;
  }

  .modal-header h2 { margin: 0; font-family: 'Archivo', sans-serif; font-size: 22px; }

  .close-modal {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #9a958a;
    padding: 0;
    width: 32px;
    height: 32px;
    line-height: 1;
  }

  /* ====== TABS ====== */
  .tabs {
    display: flex;
    padding: 16px 32px 0;
    border-bottom: 1px solid #e2dfd8;
    margin-top: 16px;
  }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    color: #9a958a;
    cursor: pointer;
    margin-bottom: -1px;
    transition: all .2s;
  }

  .tab-btn.active { color: #15140f; border-bottom-color: #15140f; }

  .tab-pane { display: none; padding: 24px 32px; }
  .tab-pane.active { display: block; }

  /* ====== FORM ====== */
  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-family: 'Archivo', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    color: #9a958a;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e2dfd8;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    color: #15140f;
    background: #fff;
  }

  .form-group textarea { resize: vertical; min-height: 90px; }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: #15140f;
    box-shadow: 0 0 0 3px rgba(21,20,15,.08);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    padding: 20px 32px 28px;
    border-top: 1px solid #e2dfd8;
    margin-top: 8px;
  }

  /* ====== GALLERY ====== */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 4/3;
    border-radius: 6px;
    overflow: hidden;
    background: #e2dfd8;
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .gallery-item-remove {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(179,38,30,.9);
    color: #fff;
    border: none;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    letter-spacing: 0;
  }

  .gallery-item-error {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #9a958a;
  }

  .gallery-empty {
    text-align: center;
    color: #9a958a;
    font-size: 13px;
    padding: 24px;
    border: 2px dashed #e2dfd8;
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .gallery-add-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .gallery-add-row .form-group { flex: 1; margin: 0; }

  /* ====== SECTIONS ====== */
  .section-item {
    border: 1px solid #e2dfd8;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    background: #fafaf8;
  }

  .section-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .section-item-header span {
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .1em;
    color: #9a958a;
    text-transform: uppercase;
  }

  .sections-empty {
    text-align: center;
    color: #9a958a;
    font-size: 13px;
    padding: 32px;
    border: 2px dashed #e2dfd8;
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .section-img-preview {
    width: 52px;
    height: 40px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid #e2dfd8;
    margin-left: 8px;
  }

  /* ====== STATUS / ALERTS ====== */
  .api-status {
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 13px;
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
  }

  .api-status.connected { background: #c8e6c9; color: #1b5e20; border: 1px solid #81c784; }
  .api-status.disconnected { background: #ffcdd2; color: #b71c1c; border: 1px solid #ef5350; }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(21,20,15,.2);
    border-top-color: #15140f;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .alert {
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
    font-weight: 500;
  }

  .alert-success { background: #c8e6c9; color: #1b5e20; border: 1px solid #81c784; }
  .alert-error { background: #ffcdd2; color: #b71c1c; border: 1px solid #ef5350; }

  @media (max-width: 700px) {
    .admin-container { padding: 20px 16px; }
    .admin-header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .modal-content { margin-top: 0; border-radius: 8px; }
    .tab-pane { padding: 20px 20px; }
    .modal-header { padding: 20px 20px 0; }
    .tabs { padding: 12px 20px 0; }
    .form-actions { padding: 16px 20px 20px; }
    .form-row { grid-template-columns: 1fr; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="admin-container">
  <div class="admin-header">
    <h1>📋 Admin Panel</h1>
    <div class="admin-actions">
      <button class="btn-primary" id="btn-add-project">+ Add Project</button>
      <button class="btn-secondary" onclick="window.location.href='index.html'">← Back</button>
      <button class="btn-secondary" onclick="logout()">Logout</button>
    </div>
  </div>

  <div id="api-status" class="api-status disconnected">
    <span class="spinner"></span> Checking Supabase connection...
  </div>

  <div id="alerts"></div>

  <div id="projects-container" class="projects-grid">
    <p style="text-align:center;color:#9a958a;padding:40px;grid-column:1/-1;">Loading projects...</p>
  </div>
</div>

<!-- Project Modal -->
<div id="project-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Add Project</h2>
      <button class="close-modal" onclick="closeModal()">&times;</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('details')">Details</button>
      <button class="tab-btn" onclick="switchTab('gallery')">Gallery</button>
      <button class="tab-btn" onclick="switchTab('sections')">Sections</button>
    </div>

    <!-- Tab: Details -->
    <div id="tab-details" class="tab-pane active">
      <form id="project-form" onsubmit="return false;">
        <div class="form-row">
          <div class="form-group">
            <label>Project ID (kebab-case)</label>
            <input type="text" id="project_id" required placeholder="e.g. sukhumvit-residence">
          </div>
          <div class="form-group">
            <label>Year</label>
            <input type="text" id="year" required placeholder="e.g. 2025">
          </div>
        </div>

        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" required placeholder="e.g. Sukhumvit Residence">
        </div>

        <div class="form-group">
          <label>Subtitle</label>
          <input type="text" id="subtitle" required placeholder="e.g. บ้านพักอาศัย · Interior & Exterior">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Type Label</label>
            <input type="text" id="type_label" required placeholder="e.g. Photography">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="cat_label" required>
              <option value="">Select category...</option>
              <option value="INTERIOR & EXTERIOR">INTERIOR & EXTERIOR</option>
              <option value="EVENT">EVENT</option>
              <option value="DOCUMENTARY">DOCUMENTARY</option>
              <option value="PRESENTATION">PRESENTATION</option>
              <option value="COMPANY PROFILE">COMPANY PROFILE</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="location" required placeholder="e.g. กรุงเทพมหานคร">
        </div>

        <div class="form-group">
          <label>Main Description</label>
          <textarea id="body" required placeholder="Main description..."></textarea>
        </div>

        <div class="form-group">
          <label>Client</label>
          <input type="text" id="client" placeholder="ชื่อลูกค้า / บริษัท">
        </div>

        <div class="form-group">
          <label>Hero Image URL</label>
          <input type="text" id="hero_placeholder" placeholder="https://... (Google Drive, Imgur, etc)" oninput="updateHeroPreview()">
          <div id="hero-preview-container" style="margin-top:12px;display:none;">
            <img id="hero-preview-img" src="" alt="" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;border:1px solid #e2dfd8;">
          </div>
        </div>

        <div class="form-group">
          <label>YouTube Video URL</label>
          <input type="text" id="youtube_url" placeholder="https://www.youtube.com/watch?v=... หรือ https://youtu.be/...">
        </div>
      </form>
    </div>

    <!-- Tab: Gallery -->
    <div id="tab-gallery" class="tab-pane">
      <p style="font-size:13px;color:#9a958a;margin:0 0 16px;">เพิ่มรูปภาพหลายรูปสำหรับ project นี้</p>

      <div id="gallery-grid" class="gallery-grid"></div>

      <div class="gallery-add-row">
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="gallery-url-input" placeholder="https://... (Google Drive, Imgur, etc)" oninput="updateGalleryPreview()">
        </div>
        <button type="button" class="btn-primary btn-sm" style="white-space:nowrap;padding:10px 16px;" onclick="addGalleryUrl()">+ Add</button>
      </div>
      <div id="gallery-preview-container" style="margin-top:12px;display:none;">
        <img id="gallery-preview-img" src="" alt="" style="width:100%;max-height:150px;object-fit:cover;border-radius:8px;border:1px solid #e2dfd8;">
      </div>
    </div>

    <!-- Tab: Sections -->
    <div id="tab-sections" class="tab-pane">
      <p style="font-size:13px;color:#9a958a;margin:0 0 16px;">เพิ่ม sections/articles ใน project นี้</p>
      <div id="sections-list"></div>
      <button type="button" class="btn-secondary" onclick="addSection()" style="width:100%;">+ Add Section</button>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button type="button" class="btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  SUPABASE_URL: 'https://pzrjboiioplhijzyfdmf.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6cmpib2lpb3BsaGlqenlmZG1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjMzMjAsImV4cCI6MjA5ODM5OTMyMH0.jxxENlcyfRrigb3nrEkxjclJqPYEa-WnPyJd_IuRxyw'
};

let projects = [];
let currentEditId = null;
let galleryImages = [];
let projectSections = [];

// ===== API =====
async function apiFetch(path, opts = {}) {
  const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1${path}`, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`,
      'apikey': CONFIG.SUPABASE_KEY,
      'Content-Type': 'application/json',
      ...opts.headers,
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ===== CONVERT GOOGLE DRIVE LINK =====
function convertGDriveLink(url) {
  if (url.includes('drive.google.com')) {
    // เปลี่ยน /view?... เป็น /preview
    return url.replace(/\/view\?.*$/, '/preview');
  }
  return url;
}

// ===== HERO PREVIEW =====
function updateHeroPreview() {
  const input = document.getElementById('hero_placeholder');
  const url = input.value.trim();
  const container = document.getElementById('hero-preview-container');
  const img = document.getElementById('hero-preview-img');

  if (!url) {
    container.style.display = 'none';
    return;
  }

  const previewUrl = convertGDriveLink(url);
  img.src = previewUrl;
  container.style.display = 'block';
}

// ===== GALLERY PREVIEW =====
function updateGalleryPreview() {
  const input = document.getElementById('gallery-url-input');
  const url = input.value.trim();
  const container = document.getElementById('gallery-preview-container');
  const img = document.getElementById('gallery-preview-img');

  if (!url) {
    container.style.display = 'none';
    return;
  }

  const previewUrl = convertGDriveLink(url);
  img.src = previewUrl;
  container.style.display = 'block';
}

// ===== GALLERY =====
function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  if (!galleryImages.length) {
    grid.innerHTML = '<div class="gallery-empty" style="grid-column:1/-1">ยังไม่มีรูปภาพ — เพิ่ม URL ด้านล่าง</div>';
    return;
  }
  grid.innerHTML = galleryImages.map((img, i) => {
    const displayUrl = convertGDriveLink(img.url);
    return `
    <div class="gallery-item">
      <img src="${escHtml(displayUrl)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="gallery-item-error" style="display:none">🖼️</div>
      <button class="gallery-item-remove" onclick="removeGalleryImage(${i})" title="Remove">×</button>
    </div>
  `;
  }).join('');
}

function addGalleryUrl() {
  const input = document.getElementById('gallery-url-input');
  const url = input.value.trim();
  if (!url) return;
  galleryImages.push({ url });
  input.value = '';
  document.getElementById('gallery-preview-container').style.display = 'none';
  renderGallery();
}

function removeGalleryImage(i) {
  galleryImages.splice(i, 1);
  renderGallery();
}

// ===== SECTIONS =====
function renderSections() {
  const list = document.getElementById('sections-list');
  if (!projectSections.length) {
    list.innerHTML = '<div class="sections-empty">ยังไม่มี sections — click "+ Add Section" เพื่อเพิ่ม</div>';
    return;
  }
  list.innerHTML = projectSections.map((s, i) => {
    const displayUrl = s.image_url ? convertGDriveLink(s.image_url) : '';
    return `
    <div class="section-item">
      <div class="section-item-header">
        <span>Section ${i + 1}</span>
        <button class="btn-danger btn-sm" onclick="removeSection(${i})">Remove</button>
      </div>
      <div class="form-group">
        <label>Section Title</label>
        <input type="text" value="${escHtml(s.title || '')}" oninput="projectSections[${i}].title=this.value" placeholder="e.g. The Challenge">
      </div>
      <div class="form-group">
        <label>Body Text</label>
        <textarea oninput="projectSections[${i}].body=this.value" placeholder="Write section content here...">${escHtml(s.body || '')}</textarea>
      </div>
      <div class="form-group">
        <label>Section Image URL (optional)</label>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="flex:1;">
            <input type="text" value="${escHtml(s.image_url || '')}" oninput="projectSections[${i}].image_url=this.value;renderSections()" placeholder="https://...">
          </div>
          ${displayUrl ? `<img src="${escHtml(displayUrl)}" alt="" class="section-img-preview" style="display:block;margin-top:0;flex-shrink:0;" onerror="this.style.display='none'">` : ''}
        </div>
      </div>
    </div>
  `;
  }).join('');
}

function addSection() {
  projectSections.push({ title: '', body: '', image_url: '' });
  renderSections();
}

function removeSection(i) {
  projectSections.splice(i, 1);
  renderSections();
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ===== MODAL =====
function openAddModal() {
  currentEditId = null;
  galleryImages = [];
  projectSections = [];
  document.getElementById('modal-title').textContent = 'Add New Project';
  document.getElementById('project-form').reset();
  document.getElementById('project_id').disabled = false;
  switchTab('details');
  renderGallery();
  renderSections();
  document.getElementById('project-modal').classList.add('active');
}

async function editProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;

  currentEditId = id;
  document.getElementById('modal-title').textContent = 'Edit Project';
  document.getElementById('project_id').disabled = true;

  ['project_id','title','subtitle','type_label','year','location','body','client','hero_placeholder','youtube_url'].forEach(k => {
    const el = document.getElementById(k);
    if (el) el.value = p[k] || '';
  });
  document.getElementById('cat_label').value = p.cat_label || '';

  // Convert Google Drive URLs to preview format when loading
  const rawGallery = Array.isArray(p.gallery_images) ? JSON.parse(JSON.stringify(p.gallery_images)) : [];
  galleryImages = rawGallery.map(img => ({
    url: convertGDriveLink(img.url || img)
  }));

  const rawSections = Array.isArray(p.project_sections) ? JSON.parse(JSON.stringify(p.project_sections)) : [];
  projectSections = rawSections.map(s => ({
    title: s.title || '',
    body: s.body || '',
    image_url: s.image_url ? convertGDriveLink(s.image_url) : ''
  }));

  switchTab('details');
  renderGallery();
  renderSections();
  document.getElementById('project-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('project-modal').classList.remove('active');
  currentEditId = null;
}

// ===== SAVE =====
async function saveProject() {
  const required = ['project_id','title','subtitle','type_label','cat_label','year','location','body'];
  for (const f of required) {
    if (!document.getElementById(f).value.trim()) {
      switchTab('details');
      document.getElementById(f).focus();
      showAlert('กรุณากรอกข้อมูลให้ครบ', 'error');
      return;
    }
  }

  const formData = {
    project_id: document.getElementById('project_id').value.trim(),
    title: document.getElementById('title').value.trim(),
    subtitle: document.getElementById('subtitle').value.trim(),
    type_label: document.getElementById('type_label').value.trim(),
    cat_label: document.getElementById('cat_label').value,
    year: document.getElementById('year').value.trim(),
    location: document.getElementById('location').value.trim(),
    body: document.getElementById('body').value.trim(),
    body_detail: '',
    client: document.getElementById('client').value.trim(),
    hero_placeholder: document.getElementById('hero_placeholder').value.trim(),
    youtube_url: document.getElementById('youtube_url').value.trim(),
    gallery_images: galleryImages.filter(img => img.url),
    project_sections: projectSections,
  };

  try {
    if (currentEditId) {
      await apiFetch(`/projects?id=eq.${currentEditId}`, {
        method: 'PATCH',
        body: JSON.stringify(formData),
      });
      showAlert('Project updated! ✓', 'success');
    } else {
      await apiFetch('/projects', {
        method: 'POST',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify(formData),
      });
      showAlert('Project created! ✓', 'success');
    }
    closeModal();
    loadProjects();
  } catch (e) {
    showAlert('Error: ' + e.message, 'error');
  }
}

// ===== API STATUS / LOAD =====
async function checkApiStatus() {
  const el = document.getElementById('api-status');
  try {
    await apiFetch('/projects?limit=1');
    el.innerHTML = '✓ Connected to Supabase';
    el.className = 'api-status connected';
    loadProjects();
  } catch (e) {
    el.innerHTML = '✗ Cannot connect to Supabase';
    el.className = 'api-status disconnected';
  }
}

async function loadProjects() {
  try {
    projects = await apiFetch('/projects?order=created_at.desc');
    renderProjects();
  } catch (e) {
    showAlert('Failed to load: ' + e.message, 'error');
  }
}

// ===== DELETE =====
async function deleteProject(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  try {
    await apiFetch(`/projects?id=eq.${id}`, { method: 'DELETE' });
    showAlert('Project deleted', 'success');
    loadProjects();
  } catch (e) {
    showAlert('Error: ' + e.message, 'error');
  }
}

// ===== RENDER PROJECTS =====
function renderProjects() {
  const c = document.getElementById('projects-container');
  if (!projects.length) {
    c.innerHTML = '<p style="text-align:center;color:#9a958a;padding:40px;grid-column:1/-1;">No projects yet. <a href="#" onclick="openAddModal();return false;">Add one</a></p>';
    return;
  }

  c.innerHTML = projects.map(p => {
    const imgs = Array.isArray(p.gallery_images) ? p.gallery_images : [];
    const firstImg = p.hero_placeholder || (imgs[0] && imgs[0].url) || '';
    const thumbHtml = firstImg
      ? `<img class="project-card-thumb" src="${escHtml(firstImg)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="project-card-thumb-placeholder" style="display:none">📷</div>`
      : `<div class="project-card-thumb-placeholder">📷</div>`;
    const sects = Array.isArray(p.project_sections) ? p.project_sections : [];

    return `<div class="project-card">
      ${thumbHtml}
      <div class="project-card-body">
        <h3>${escHtml(p.title)}</h3>
        <p>${escHtml(p.subtitle || '')}</p>
        <div class="project-meta-tags">
          ${p.cat_label ? `<span class="meta-tag">${escHtml(p.cat_label)}</span>` : ''}
          ${p.year ? `<span class="meta-tag">${escHtml(p.year)}</span>` : ''}
          ${imgs.length ? `<span class="meta-tag">📷 ${imgs.length}</span>` : ''}
          ${sects.length ? `<span class="meta-tag">📄 ${sects.length}</span>` : ''}
        </div>
        <div class="project-actions">
          <button class="btn-secondary" onclick="editProject('${p.id}')">Edit</button>
          <button class="btn-danger" onclick="deleteProject('${p.id}', '${escAttr(p.title)}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== HELPERS =====
function showAlert(msg, type) {
  const el = document.getElementById('alerts');
  const div = document.createElement('div');
  div.className = `alert alert-${type}`;
  div.textContent = msg;
  el.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s).replace(/'/g, "\\'");
}

// ===== INIT =====
document.getElementById('btn-add-project').addEventListener('click', openAddModal);
document.getElementById('project-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('project-modal')) closeModal();
});
document.getElementById('gallery-url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addGalleryUrl(); }
});

checkApiStatus();
</script>
